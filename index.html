<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --primary: #E63946;
            --primary-light: #FF4D5A;
            --primary-dark: #C62D39;
            --orange: #FF8C42;
            --yellow: #FCBF49;
            --green: #2A9D8F;
            --green-dark: #1F7A6E;
            --dark-navy: #1D3557;
            --dark-navy-deeper: #0F1E2E;
            --purple: #7C3AED;
            --glass: rgba(255,255,255,0.08);
            --glass-strong: rgba(255,255,255,0.92);
            --shadow-sm: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-md: 0 12px 35px rgba(0,0,0,0.18);
            --shadow-lg: 0 25px 70px rgba(0,0,0,0.25);
            --shadow-glow-green: 0 0 30px rgba(42,157,143,0.4);
            --shadow-glow-red: 0 0 30px rgba(230,57,70,0.4);
            --shadow-glow-orange: 0 0 30px rgba(255,140,66,0.4);
            --shadow-glow-yellow: 0 0 30px rgba(252,191,73,0.4);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-full: 50px;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-navy);
            color: #1a1a2e;
            user-select: none;
            -webkit-user-select: none;
        }

        #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        .screen {
            position: fixed; inset: 0; z-index: 1;
            opacity: 0; visibility: hidden;
            transform: translateY(15px) scale(0.99);
            transition: opacity 0.45s ease, transform 0.45s ease, visibility 0s 0.45s;
            display: flex; flex-direction: column;
        }
        .screen.active {
            opacity: 1; visibility: visible;
            transform: translateY(0) scale(1);
            transition: opacity 0.45s ease, transform 0.45s ease, visibility 0s 0s;
        }

        .global-loading {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(29,53,87,0.88);
            backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center;
            color: white; flex-direction: column; gap: 16px;
        }
        .global-loading.show { display: flex; }
        .loader-ring {
            width: 52px; height: 52px;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== LOGIN ===== */
        .login-screen {
            background: linear-gradient(-45deg, #E63946, #FF8C42, #1D3557, #2A9D8F);
            background-size: 400% 400%;
            animation: gradientShift 14s ease infinite;
            align-items: center; justify-content: center;
            text-align: center; color: white; padding: 30px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .login-logo {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 900; letter-spacing: -2px; line-height: 1;
            margin-bottom: 8px; animation: logoEntry 1s ease-out;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        .login-logo span { color: var(--yellow); }
        @keyframes logoEntry {
            from { opacity: 0; transform: translateY(-30px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-sub {
            font-size: 1.15rem; font-weight: 300;
            opacity: 0; animation: fadeUp 0.8s 0.3s ease forwards;
            margin-bottom: 50px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 0.85; transform: translateY(0); }
        }
        .google-btn {
            display: inline-flex; align-items: center; gap: 12px;
            background: white; color: #333;
            padding: 16px 36px; border: none; border-radius: var(--radius-full);
            font-size: 1.05rem; font-weight: 600; cursor: pointer;
            box-shadow: var(--shadow-md);
            opacity: 0; animation: fadeUp 0.8s 0.6s ease forwards;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .google-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .google-btn:active { transform: scale(0.97); }
        .google-btn img { width: 26px; height: 26px; }

        /* ===== HEADER ===== */
        .app-header {
            background: var(--glass-strong);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            z-index: 10; flex-shrink: 0;
        }
        .user-info {
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; padding: 6px 10px; border-radius: var(--radius-full);
            transition: background 0.2s;
        }
        .user-info:hover { background: rgba(0,0,0,0.05); }
        .user-photo {
            width: 44px; height: 44px; border-radius: 50%;
            object-fit: cover; border: 2.5px solid var(--green);
            transition: transform 0.2s;
        }
        .user-info:hover .user-photo { transform: scale(1.08); }
        .user-name { font-weight: 600; font-size: 1rem; color: #1a1a2e; }
        .header-actions { display: flex; gap: 8px; }
        .btn-header {
            border: none; padding: 10px 20px; border-radius: var(--radius-full);
            font-weight: 600; font-size: 0.85rem; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }
        .btn-header:active { transform: scale(0.95); }
        .btn-header.primary { background: var(--primary); color: white; }
        .btn-header.orange { background: var(--orange); color: white; }

        /* ===== BUSCA ===== */
        .search-wrap { padding: 12px 20px 0; flex-shrink: 0; }
        .search-bar {
            width: 100%; max-width: 460px; margin: 0 auto; display: block;
            padding: 14px 20px 14px 48px;
            border: 2px solid transparent;
            border-radius: var(--radius-full);
            font-size: 0.95rem; font-family: inherit;
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .search-bar:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(42,157,143,0.15);
        }
        .search-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #999; font-size: 22px; pointer-events: none;
        }
        .search-wrap-inner { position: relative; max-width: 460px; margin: 0 auto; }

        .card-counter {
            text-align: center; padding: 10px 0 0;
            font-size: 0.82rem; color: rgba(255,255,255,0.6); font-weight: 500;
            flex-shrink: 0;
        }

        /* ===== SWIPE ===== */
        .swipe-container {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            padding: 10px 20px 20px;
        }

        .event-card {
            position: absolute;
            width: min(380px, calc(100vw - 40px));
            height: min(540px, calc(100vh - 280px));
            max-height: 540px;
            background: white; border-radius: var(--radius-lg);
            overflow: hidden; box-shadow: var(--shadow-lg);
            will-change: transform; touch-action: none;
            cursor: grab; display: flex; flex-direction: column;
        }
        .event-card:active { cursor: grabbing; }
        .event-card.stack-behind {
            transform: scale(0.94) translateY(14px);
            filter: brightness(0.85); pointer-events: none;
        }
        .card-cover {
            height: 42%; min-height: 160px;
            background-size: cover; background-position: center;
            position: relative; flex-shrink: 0;
        }
        .card-cover::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
        }
        .card-category-badge {
            position: absolute; top: 16px; left: 16px; z-index: 2;
            padding: 6px 14px; border-radius: var(--radius-full);
            font-size: 0.78rem; font-weight: 600; color: white;
            backdrop-filter: blur(8px); background: rgba(0,0,0,0.35);
            display: flex; align-items: center; gap: 5px;
        }
        .card-attendee-badge {
            position: absolute; top: 16px; right: 16px; z-index: 2;
            padding: 6px 14px; border-radius: var(--radius-full);
            font-size: 0.78rem; font-weight: 600; color: white;
            backdrop-filter: blur(8px); background: rgba(0,0,0,0.35);
            display: flex; align-items: center; gap: 5px;
        }
        .card-title-overlay {
            position: absolute; bottom: 14px; left: 20px; z-index: 2;
            color: white; font-size: 1.35rem; font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4); line-height: 1.2;
        }
        .card-body {
            flex: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .card-body::-webkit-scrollbar { width: 4px; }
        .card-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
        .card-rating { display: flex; align-items: center; gap: 6px; }
        .star { font-size: 1.1rem; }
        .star.filled { color: var(--yellow); }
        .star.empty { color: #ddd; }
        .card-rating-num { font-size: 0.85rem; color: #777; font-weight: 500; }
        .card-desc { font-size: 0.9rem; color: #555; line-height: 1.55; flex: 1; }

        .card-location-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 16px; border: 2px solid var(--green);
            border-radius: var(--radius-sm); background: none;
            cursor: pointer; font-family: inherit; font-size: 0.85rem;
            color: var(--green); font-weight: 600;
            transition: all 0.2s; width: 100%;
        }
        .card-location-btn:hover {
            background: var(--green); color: white;
        }
        .card-location-btn .material-icons-round { font-size: 20px; }

        .swipe-label {
            position: absolute; top: 30px; z-index: 5;
            padding: 10px 24px; border-radius: var(--radius-full);
            font-size: 1.6rem; font-weight: 800; letter-spacing: 3px;
            border: 4px solid; opacity: 0; pointer-events: none;
            transition: opacity 0.1s;
        }
        .swipe-label.like-label { right: 20px; color: var(--green); border-color: var(--green); transform: rotate(-20deg); }
        .swipe-label.nope-label { left: 20px; color: var(--primary); border-color: var(--primary); transform: rotate(20deg); }
        .swipe-label.super-label { top: auto; bottom: 100px; left: 50%; transform: translateX(-50%); color: var(--yellow); border-color: var(--yellow); font-size: 1.2rem; }

        .action-bar {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 16px; z-index: 10;
        }
        .btn-action {
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
            font-family: inherit; position: relative;
        }
        .btn-action:active { transform: scale(0.88) !important; }
        .btn-action:hover { transform: scale(1.12); }
        .btn-nope {
            width: 58px; height: 58px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
            color: white; font-size: 24px;
            box-shadow: 0 6px 20px rgba(230,57,70,0.4);
        }
        .btn-nope:hover { box-shadow: var(--shadow-glow-red); }
        .btn-super {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--yellow), #E0A830);
            color: white; font-size: 20px;
            box-shadow: 0 6px 20px rgba(252,191,73,0.4);
        }
        .btn-super:hover { box-shadow: var(--shadow-glow-yellow); }
        .btn-like {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: white; font-size: 30px;
            box-shadow: 0 6px 20px rgba(42,157,143,0.4);
        }
        .btn-like:hover { box-shadow: var(--shadow-glow-green); }

        .empty-state {
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center; gap: 12px;
        }
        .empty-state.show { display: flex; }
        .empty-icon { font-size: 5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .empty-state p { opacity: 0.7; font-size: 1.05rem; }
        .empty-state small { opacity: 0.45; font-size: 0.85rem; }

        /* ===== PERFIL ===== */
        .profile-screen { background: rgba(29,53,87,0.95); }
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 5;
            background: rgba(255,255,255,0.12); color: white; border: none;
            padding: 10px 22px; border-radius: var(--radius-full);
            cursor: pointer; font-family: inherit; font-weight: 500;
            backdrop-filter: blur(10px);
            transition: background 0.2s, transform 0.15s;
            display: flex; align-items: center; gap: 6px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .back-btn:active { transform: scale(0.95); }
        .profile-content {
            flex: 1; overflow-y: auto; padding: 90px 20px 30px;
        }
        .profile-content::-webkit-scrollbar { width: 5px; }
        .profile-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
        .profile-title { text-align: center; color: white; font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .profile-subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 30px; }
        .my-event-card {
            background: white; color: #333; border-radius: var(--radius-md);
            padding: 24px; margin-bottom: 18px;
            box-shadow: var(--shadow-md);
            border-left: 5px solid var(--green);
            animation: cardSlideIn 0.4s ease both;
        }
        .my-event-card.owner { border-left-color: var(--orange); }
        @keyframes cardSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .my-event-card h3 { font-size: 1.15rem; margin-bottom: 6px; color: var(--dark-navy); }
        .my-event-card .event-desc { font-size: 0.88rem; color: #666; line-height: 1.5; margin-bottom: 8px; }
        .my-event-card .event-meta { font-size: 0.82rem; color: #888; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }

        .btn-map-profile {
            display: inline-flex; align-items: center; gap: 5px;
            border: 2px solid #4285F4; background: none; color: #4285F4;
            padding: 8px 16px; border-radius: var(--radius-full);
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.2s;
        }
        .btn-map-profile:hover { background: #4285F4; color: white; }
        .btn-map-profile .material-icons-round { font-size: 16px; }

        .my-event-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-event {
            border: none; padding: 10px 18px; border-radius: var(--radius-full);
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-event:active { transform: scale(0.95); }
        .btn-event.chat { background: var(--purple); color: white; }
        .btn-event.rate { background: var(--yellow); color: #333; }
        .btn-event.edit { background: var(--green); color: white; }
        .btn-event.leave {
            background: transparent; color: var(--primary);
            border: 2px solid var(--primary);
            margin-top: 8px; width: 100%; justify-content: center;
        }
        .btn-event.leave:hover { background: var(--primary); color: white; }
        .profile-empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); font-size: 1rem; }

        /* ===== CHAT ===== */
        .chat-screen { background: #f0f2f5; }
        .chat-header {
            background: var(--dark-navy); color: white; padding: 14px 18px;
            display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .chat-back {
            background: none; border: none; color: white; font-size: 1.6rem;
            cursor: pointer; padding: 4px; line-height: 1; transition: opacity 0.2s;
        }
        .chat-back:hover { opacity: 0.7; }
        .chat-header-info { flex: 1; }
        .chat-header-info h3 { font-size: 1rem; font-weight: 600; margin: 0; }
        .chat-header-info small { opacity: 0.6; font-size: 0.78rem; }
        .btn-rate-chat {
            background: rgba(255,255,255,0.15); color: white; border: none;
            padding: 8px 16px; border-radius: var(--radius-full);
            cursor: pointer; font-size: 0.82rem; font-weight: 500;
            font-family: inherit; display: flex; align-items: center; gap: 5px;
            transition: background 0.2s;
        }
        .btn-rate-chat:hover { background: rgba(255,255,255,0.25); }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 18px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .msg { max-width: 78%; display: flex; flex-direction: column; gap: 3px; }
        .msg.sent { align-self: flex-end; }
        .msg.received { align-self: flex-start; }
        .msg-bubble {
            padding: 12px 16px; border-radius: 18px;
            font-size: 0.92rem; line-height: 1.45; word-break: break-word;
        }
        .msg.received .msg-bubble {
            background: white; color: #333; border-bottom-left-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .msg.sent .msg-bubble { background: var(--green); color: white; border-bottom-right-radius: 6px; }
        .msg-info { font-size: 0.7rem; color: #999; padding: 0 4px; }
        .msg.sent .msg-info { text-align: right; }
        .chat-input-area {
            padding: 12px 16px; background: white;
            border-top: 1px solid #e0e0e0;
            display: flex; gap: 10px; align-items: center; flex-shrink: 0;
        }
        .chat-input {
            flex: 1; padding: 13px 20px; border: 2px solid #e8e8e8;
            border-radius: var(--radius-full); font-size: 0.95rem;
            font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: var(--green); }
        .chat-send {
            width: 48px; height: 48px; border: none;
            background: var(--green); color: white; border-radius: 50%;
            font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s, background 0.2s; flex-shrink: 0;
        }
        .chat-send:active { transform: scale(0.9); }
        .chat-send:hover { background: var(--green-dark); }

        /* ===== MODAIS ===== */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: var(--radius-lg);
            width: 100%; max-width: 500px; max-height: 90vh;
            overflow-y: auto; padding: 36px 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            animation: modalIn 0.35s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
        .modal-title {
            text-align: center; font-size: 1.4rem; font-weight: 700;
            color: var(--dark-navy); margin-bottom: 24px;
        }
        .form-field {
            width: 100%; padding: 14px 16px;
            border: 2px solid #e8e8e8; border-radius: var(--radius-sm);
            font-size: 0.95rem; font-family: inherit; outline: none;
            transition: border-color 0.2s; margin-bottom: 14px;
        }
        .form-field:focus { border-color: var(--green); }
        .form-field::placeholder { color: #aaa; }
        .btn-modal {
            width: 100%; padding: 15px; border: none;
            border-radius: var(--radius-sm); font-size: 1rem;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: transform 0.15s, opacity 0.2s; margin-bottom: 8px;
        }
        .btn-modal:active { transform: scale(0.98); }
        .btn-modal.submit { background: var(--dark-navy); color: white; }
        .btn-modal.submit.green { background: var(--green); }
        .btn-modal.cancel { background: #f0f0f0; color: #666; }

        /* ===== MODAL DO MAPA ===== */
        .modal-box.map-modal {
            max-width: 600px; padding: 0; overflow: hidden;
        }
        .map-modal-header {
            background: var(--dark-navy); color: white;
            padding: 18px 24px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .map-modal-header h3 {
            font-size: 1.05rem; font-weight: 600; margin: 0;
            display: flex; align-items: center; gap: 8px;
        }
        .map-modal-close {
            background: rgba(255,255,255,0.15); border: none;
            color: white; width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .map-modal-close:hover { background: rgba(255,255,255,0.3); }
        .map-container {
            width: 100%; height: 350px; position: relative;

// ==================== ESTADO ====================

// ==================== UTILITÁRIOS ====================
function showLoading(show) { $('globalLoading').classList.toggle('show', show); }

function showToast(msg, type = 'success') {

function escapeHtml(text) {

function getCategoryLabel(cat) {

// ==================== PARTÍCULAS ====================
let particles = [];
function initParticles() {
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
    particles = [];
    const count = Math.min(35, Math.floor(window.innerWidth / 30));
    for (let i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * bgCanvas.width,
            y: Math.random() * bgCanvas.height,
            r: Math.random() * 3 + 1,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            alpha: Math.random() * 0.3 + 0.05,
            hue: Math.random() > 0.5 ? 42 : 170
        });
    }
}
function animateParticles() {
    ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    const grd = ctx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
    grd.addColorStop(0, '#1D3557');
    grd.addColorStop(1, '#0F1E2E');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = bgCanvas.width;
        if (p.x > bgCanvas.width) p.x = 0;
        if (p.y < 0) p.y = bgCanvas.height;
        if (p.y > bgCanvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.r), 0, Math.PI * 2);
        if (p.hue === 42) {
            ctx.fillStyle = `rgba(252,191,73,${p.alpha})`;
        } else {
            ctx.fillStyle = `rgba(42,157,143,${p.alpha})`;
        }
        ctx.fill();
    });
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 140) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(42,157,143,${0.08 * (1 - dist / 140)})`;
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animateParticles);
}
window.addEventListener('resize', () => { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; });
initParticles();
animateParticles();

// ==================== GOOGLE MAPS ====================
function openMapModal(eventName, location, mapsUrl, wppUrl) {
    currentMapData = { location, mapsUrl: mapsUrl || '', wppUrl: wppUrl || '' };
    $('mapEventName').textContent = eventName;
    $('mapLocationAddr').textContent = location;

    const container = $('mapContainer');

    let embedUrl;
    if (mapsUrl) {
        const placeMatch = mapsUrl.match(/place\/([^/]+)/);
        const queryMatch = mapsUrl.match(/[?&]q=([^&]+)/);
        const coordMatch = mapsUrl.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);

        if (coordMatch) {
            embedUrl = `https://maps.google.com/maps?q=${coordMatch[1]},${coordMatch[2]}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        } else if (placeMatch) {
            embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent(placeMatch[1])}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        } else if (queryMatch) {
            embedUrl = `https://maps.google.com/maps?q=${queryMatch[1]}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        } else {
            embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent(location)}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
        }
    } else {
        embedUrl = `https://maps.google.com/maps?q=${encodeURIComponent(location)}&t=&z=16&ie=UTF8&iwloc=&output=embed`;
    }

    container.innerHTML = `
        <div class="map-loading" id="mapLoading">
            <div class="loader-ring"></div>
            <span style="font-size:0.85rem;">Carregando mapa...</span>
        </div>
    `;

    const iframe = document.createElement('iframe');
    iframe.setAttribute('loading', 'lazy');
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
    iframe.src = embedUrl;
    iframe.style.cssText = 'width:100%;height:100%;border:none;opacity:0;transition:opacity 0.4s;';

    iframe.addEventListener('load', () => {
        const ld = container.querySelector('.map-loading');
        if (ld) ld.remove();
        iframe.style.opacity = '1';
    });

    iframe.addEventListener('error', () => {
        const ld = container.querySelector('.map-loading');
        if (ld) ld.innerHTML = '<span class="material-icons-round" style="font-size:40px;color:#ccc;">map_off</span><span style="font-size:0.85rem;color:#999;">Não foi possível carregar o mapa</span>';
    });

    container.appendChild(iframe);

    $('btnOpenWpp').style.display = wppUrl ? 'flex' : 'none';
    $('mapModal').classList.add('show');
}

 $('btnOpenMaps').addEventListener('click', () => {
    const { location, mapsUrl } = currentMapData;
    const url = mapsUrl || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
    window.open(url, '_blank', 'noopener');
});

 $('btnOpenWpp').addEventListener('click', () => {

// ==================== SWIPE ====================
const SWIPE_THRESHOLD = 100;
const VELOCITY_THRESHOLD = 0.4;

function renderCards() {
    const container = $('swipeContainer');
    const empty = $('emptyState');
    const actionBar = $('actionBar');
    const counter = $('cardCounter');

    container.querySelectorAll('.event-card').forEach(c => c.remove());

    const remaining = filteredEvents.length - currentCardIndex;

    if (remaining <= 0) {
        empty.classList.add('show');
        actionBar.style.display = 'none';
        counter.textContent = '';
        return;
    }

    empty.classList.remove('show');
    actionBar.style.display = 'flex';
    counter.textContent = `${remaining} evento${remaining !== 1 ? 's' : ''} disponível${remaining !== 1 ? 'is' : ''}`;

    if (remaining > 1) {
        const behindEvent = filteredEvents[currentCardIndex + 1];
        const behindCard = buildCardElement(behindEvent);
        behindCard.classList.add('stack-behind');
        container.appendChild(behindCard);
    }

    const mainEvent = filteredEvents[currentCardIndex];
    const mainCard = buildCardElement(mainEvent);
    mainCard.style.animation = 'cardEnter 0.4s ease both';
    container.appendChild(mainCard);

    ['like-label', 'nope-label', 'super-label'].forEach(cls => {
        const label = document.createElement('div');
        label.className = `swipe-label ${cls}`;
        label.textContent = cls === 'like-label' ? 'CURTI' : cls === 'nope-label' ? 'NEXT' : 'SUPER LIKE';
        mainCard.appendChild(label);
    });

    activeCard = mainCard;
    mainCard.addEventListener('pointerdown', onSwipeStart, { passive: false });
}

function buildCardElement(event) {
    const card = document.createElement('div');
    card.className = 'event-card';
    const avgRating = event.avgRating ? parseFloat(event.avgRating).toFixed(1) : '—';
    const attendeeCount = event.attendeeCount || event.attendees?.length || 0;
    const catClass = `cat-${event.category || 'festa'}`;
    const coverUrl = `https://picsum.photos/seed/${getCoverSeed(event)}/400/250`;

    card.innerHTML = `
        <div class="card-cover" style="background-image:url('${coverUrl}')">
            <div class="card-category-badge ${catClass}">${getCategoryLabel(event.category)}</div>
            <div class="card-attendee-badge">
                <span class="material-icons-round" style="font-size:16px;">people</span> ${attendeeCount}
            </div>
            <div class="card-title-overlay">${escapeHtml(event.name)}</div>
        </div>
        <div class="card-body">
            <div class="card-rating">
                <div>${getStarHTML(event.avgRating || 0)}</div>
                <span class="card-rating-num">${avgRating}</span>
            </div>
            <p class="card-desc">${escapeHtml(event.desc)}</p>
            <button class="card-location-btn" data-action="map" data-id="${event.id}">
                <span class="material-icons-round">location_on</span>
                ${escapeHtml(event.location)}
            </button>
        </div>
    `;
    card.dataset.eventId = event.id;

    card.querySelector('.card-location-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const ev = allEvents.find(x => x.id === event.id);
        if (ev) openMapModal(ev.name, ev.location, ev.mapsUrl, ev.url);
    });

    return card;
}

function onSwipeStart(e) {
    if (!activeCard) return;
    if (e.target.closest('.card-location-btn')) return;
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    startTime = Date.now(); currentX = 0; currentY = 0;
    activeCard.style.transition = 'none';
    activeCard.setPointerCapture(e.pointerId);
    activeCard.addEventListener('pointermove', onSwipeMove, { passive: false });
    activeCard.addEventListener('pointerup', onSwipeEnd, { once: true });
    activeCard.addEventListener('pointercancel', onSwipeEnd, { once: true });
}

function onSwipeMove(e) {
    if (!isDragging || !activeCard) return;
    e.preventDefault();
    currentX = e.clientX - startX;
    currentY = e.clientY - startY;
    activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.08}deg)`;
    const progress = Math.min(Math.abs(currentX) / SWIPE_THRESHOLD, 1);
    activeCard.querySelector('.like-label').style.opacity = currentX > 0 ? progress : 0;
    activeCard.querySelector('.nope-label').style.opacity = currentX < 0 ? progress : 0;
    activeCard.querySelector('.super-label').style.opacity = currentY < -80 ? Math.min((Math.abs(currentY) - 80) / 100, 1) : 0;
}

function onSwipeEnd() {
    if (!isDragging || !activeCard) return;
    isDragging = false;
    const elapsed = Date.now() - startTime;
    const velocity = Math.abs(currentX) / elapsed;
    const eventId = activeCard.dataset.eventId;
    activeCard.querySelectorAll('.swipe-label').forEach(l => l.style.opacity = 0);

    if (currentY < -120) {
        flyCard('up', () => handleLike(eventId));
    } else if (currentX > SWIPE_THRESHOLD || (currentX > 40 && velocity > VELOCITY_THRESHOLD)) {
        flyCard('right', () => handleLike(eventId));
    } else if (currentX < -SWIPE_THRESHOLD || (currentX < -40 && velocity > VELOCITY_THRESHOLD)) {
        flyCard('left', () => handleNope(eventId));
    } else {
        activeCard.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        activeCard.style.transform = 'translate(0,0) rotate(0deg)';
    }
}

function flyCard(direction, callback) {
    if (!activeCard) return;
    const card = activeCard;
    activeCard = null;
    card.style.transition = 'transform 0.45s ease-out, opacity 0.45s ease-out';
    if (direction === 'right') { card.style.transform = 'translate(150%, 0) rotate(30deg)'; }
    else if (direction === 'left') { card.style.transform = 'translate(-150%, 0) rotate(-30deg)'; }
    else { card.style.transform = 'translate(0, -150%) scale(0.8)'; }
    card.style.opacity = '0';
    setTimeout(() => callback(), 300);
}

function animateButtonAction(direction) {
    let btn;
    if (direction === 'right') btn = $('btnLike');
    else if (direction === 'left') btn = $('btnNope');
    else btn = $('btnSuper');
    if (btn) { btn.style.transition = 'transform 0.1s'; btn.style.transform = 'scale(0.85)'; setTimeout(() => btn.style.transform = '', 150); }
}

// ==================== LIKE / NOPE ====================
async function handleLike(eventId) {
    try {
        showLoading(true);
        await db.runTransaction(async t => {
            t.update(db.collection('events').doc(eventId), {
                attendees: firebase.firestore.FieldValue.arrayUnion(currentUser.uid),
                attendeeCount: firebase.firestore.FieldValue.increment(1)
            });
            t.set(db.collection('user_events').doc(currentUser.uid), {
                myEvents: firebase.firestore.FieldValue.arrayUnion(eventId),
                seenEvents: firebase.firestore.FieldValue.arrayUnion(eventId)
            }, { merge: true });
        });
        showToast('Inscrição confirmada!');
    } catch (e) { showToast('Erro ao confirmar presença', 'error'); }
    finally { showLoading(false); currentCardIndex++; renderCards(); }
}

function handleNope(eventId) {
    db.collection('user_events').doc(currentUser.uid).set({
        seenEvents: firebase.firestore.FieldValue.arrayUnion(eventId)
    }, { merge: true }).catch(() => {});
    currentCardIndex++;
    renderCards();
}

 $('btnLike').addEventListener('click', () => {
    if (!activeCard || !filteredEvents[currentCardIndex]) return;
    animateButtonAction('right');
    flyCard('right', () => handleLike(filteredEvents[currentCardIndex]?.id));
});
 $('btnNope').addEventListener('click', () => {
    if (!activeCard || !filteredEvents[currentCardIndex]) return;
    animateButtonAction('left');
    flyCard('left', () => handleNope(filteredEvents[currentCardIndex]?.id));
});
 $('btnSuper').addEventListener('click', () => {
    if (!activeCard || !filteredEvents[currentCardIndex]) return;
    animateButtonAction('up');
    flyCard('up', () => handleLike(filteredEvents[currentCardIndex]?.id));
});

// ==================== BUSCA ====================
 $('eventSearch').addEventListener('input', () => {
    const term = $('eventSearch').value.toLowerCase().trim();
    filteredEvents = term
        ? allEvents.filter(e => (e.name||'').toLowerCase().includes(term) || (e.desc||'').toLowerCase().includes(term) || (e.location||'').toLowerCase().includes(term) || (e.category||'').toLowerCase().includes(term))
        : [...allEvents];
    currentCardIndex = 0;
    renderCards();
});

// ==================== CHAT ====================
function openChat(eventId, eventName, count) {
    const event = allEvents.find(e => e.id === eventId);
    if (!event || !(event.attendees || []).includes(currentUser.uid)) return showToast('Você precisa estar inscrito para acessar o chat.', 'error');
    currentChatEventId = eventId;
    $('chatEventName').textContent = eventName;
    $('chatParticipantCount').textContent = `${count || 1} participante${count !== 1 ? 's' : ''}`;
    showScreen('chatScreen');
    loadChatMessages();
}

function loadChatMessages() {
    if (unsubscribeChat) unsubscribeChat();
    const container = $('chatMessages');
    container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;font-size:0.9rem;">Carregando...</div>';
    unsubscribeChat = db.collection('events').doc(currentChatEventId).collection('messages').orderBy('timestamp', 'asc').onSnapshot(snapshot => {
        container.innerHTML = '';
        if (snapshot.empty) { container.innerHTML = '<div style="text-align:center;color:#aaa;padding:60px 20px;font-size:0.9rem;">Nenhuma mensagem ainda.</div>'; return; }
        snapshot.forEach(doc => {
            const msg = doc.data();
            const isSent = msg.senderId === currentUser.uid;
            const time = msg.timestamp?.toDate ? new Date(msg.timestamp.toDate()).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) : '';
            const div = document.createElement('div');
            div.className = `msg ${isSent ? 'sent' : 'received'}`;
            div.innerHTML = `<div class="msg-bubble">${escapeHtml(msg.text)}</div><span class="msg-info">${escapeHtml(msg.senderName)}${time ? ' · ' + time : ''}</span>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    });
}

function sendMessage() {
    const input = $('chatInput');
    const text = input.value.trim();
    if (!text || !currentChatEventId) return;
    input.value = '';
    db.collection('events').doc(currentChatEventId).collection('messages').add({
        senderId: currentUser.uid, senderName: currentUser.displayName,
        text, timestamp: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(() => showToast('Erro ao enviar mensagem', 'error'));
}

 $('chatSendBtn').addEventListener('click', sendMessage);
 $('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
 $('chatBackBtn').addEventListener('click', () => {
    if (unsubscribeChat) unsubscribeChat();
    unsubscribeChat = null; currentChatEventId = null;
    showScreen('profileScreen'); loadMyEvents();
});

// ==================== AVALIAÇÃO ====================
function openRatingModal(eventId, eventName) {
    currentRatingEventId = eventId;
    $('ratingEventName').textContent = eventName;
    userRating = 0; renderStarRating();
    $('ratingComment').value = '';
    $('ratingModal').classList.add('show');
}

function renderStarRating() {
    const c = $('starRating'); c.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `star-btn ${i <= userRating ? 'filled' : 'empty'}`;
        btn.textContent = '★';
        btn.setAttribute('aria-label', `${i} estrela${i > 1 ? 's' : ''}`);
        btn.addEventListener('click', () => { userRating = i; renderStarRating(); });
        btn.addEventListener('mouseenter', () => { c.querySelectorAll('.star-btn').forEach((s, idx) => s.className = `star-btn ${idx < i ? 'filled' : 'empty'}`); });
        btn.addEventListener('mouseleave', () => renderStarRating());
        c.appendChild(btn);
    }
}

 $('submitRatingBtn').addEventListener('click', async () => {
    if (userRating === 0) return showToast('Selecione pelo menos 1 estrela!', 'error');
    try {
        showLoading(true);
        await db.collection('events').doc(currentRatingEventId).collection('ratings').add({
            userId: currentUser.uid, userName: currentUser.displayName,
            rating: userRating, comment: $('ratingComment').value.trim(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Avaliação enviada!');
        $('ratingModal').classList.remove('show');
    } catch (e) { showToast('Erro ao enviar avaliação', 'error'); }
    finally { showLoading(false); }
});

 $('btnRateFromChat').addEventListener('click', () => {
    if (!currentChatEventId) return;
    const event = allEvents.find(e => e.id === currentChatEventId);
    if (event) openRatingModal(currentChatEventId, event.name);
});

// ==================== CRIAR EVENTO ====================
 $('addEventBtn').addEventListener('click', () => $('addEventModal').classList.add('show'));

 $('eventForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const name = form.name.value.trim();
    const desc = form.desc.value.trim();
    const location = form.location.value.trim();
    const category = form.category.value;
    if (!name || !desc || !location || !category) return showToast('Preencha todos os campos obrigatórios!', 'error');
    try {
        showLoading(true);
        const newEvent = await db.collection('events').add({
            name, desc, location,
            mapsUrl: form.mapsUrl.value.trim() || '',
            url: form.url.value.trim() || '',
            category, creatorId: currentUser.uid, creatorName: currentUser.displayName,
            attendees: [currentUser.uid], attendeeCount: 1,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('user_events').doc(currentUser.uid).set({
            myEvents: firebase.firestore.FieldValue.arrayUnion(newEvent.id),
            seenEvents: firebase.firestore.FieldValue.arrayUnion(newEvent.id)
        }, { merge: true });
        $('addEventModal').classList.remove('show');
        form.reset();
        showToast('Evento criado com sucesso!');
    } catch (err) { showToast('Erro ao criar evento', 'error'); }
    finally { showLoading(false); }
});

// ==================== EDITAR EVENTO ====================
async function editEvent(eventId) {
    try {
        showLoading(true);
        const doc = await db.collection('events').doc(eventId).get();
        const ev = doc.data();
        if (ev.creatorId !== currentUser.uid) return showToast('Apenas o criador pode editar.', 'error');
        $('editEventId').value = eventId;
        $('editName').value = ev.name || '';
        $('editDesc').value = ev.desc || '';
        $('editLocation').value = ev.location || '';
        $('editMapsUrl').value = ev.mapsUrl || '';
        $('editUrl').value = ev.url || '';
        $('editCategory').value = ev.category || '';
        $('editEventModal').classList.add('show');
    } catch (err) { showToast('Erro ao carregar evento', 'error'); }
    finally { showLoading(false); }
}

 $('editEventForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = $('editEventId').value;
    try {
        showLoading(true);
        await db.collection('events').doc(id).update({
            name: $('editName').value.trim(), desc: $('editDesc').value.trim(),
            location: $('editLocation').value.trim(),
            mapsUrl: $('editMapsUrl').value.trim() || '', url: $('editUrl').value.trim() || '',
            category: $('editCategory').value, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        $('editEventModal').classList.remove('show');
        showToast('Evento atualizado!');
        loadMyEvents();
    } catch (err) { showToast('Erro ao salvar', 'error'); }
    finally { showLoading(false); }
});

// ==================== SAIR DO EVENTO ====================
function removeFromEvent(eventId) {
    showConfirm('🚪', 'Sair do evento?', 'Você poderá se inscrever novamente depois.', async () => {
        try {
            showLoading(true);
            await db.runTransaction(async t => {
                t.update(db.collection('events').doc(eventId), {
                    attendees: firebase.firestore.FieldValue.arrayRemove(currentUser.uid),
                    attendeeCount: firebase.firestore.FieldValue.increment(-1)
                });
                t.update(db.collection('user_events').doc(currentUser.uid), {
                    myEvents: firebase.firestore.FieldValue.arrayRemove(eventId),
                    seenEvents: firebase.firestore.FieldValue.arrayRemove(eventId)
                });
            });
            showToast('Você saiu do evento.');
            loadMyEvents();
        } catch (e) { showToast('Erro ao sair do evento', 'error'); }
        finally { showLoading(false); }
    });
}

// ==================== MEUS EVENTOS ====================
async function loadMyEvents() {
    showLoading(true);
    const listEl = $('myEventsList');
    listEl.innerHTML = '';
    try {
        const userDoc = await db.collection('user_events').doc(currentUser.uid).get();
        const ids = userDoc.exists ? (userDoc.data().myEvents || []) : [];
        $('profileCount').textContent = ids.length > 0 ? `${ids.length} evento${ids.length > 1 ? 's' : ''} confirmado${ids.length > 1 ? 's' : ''}` : '';

        if (ids.length === 0) {
            listEl.innerHTML = '<div class="profile-empty">Nenhum evento confirmado ainda.<br>Curta eventos para vê-los aqui!</div>';
            return;
        }

        const snap = await db.collection('events').where(firebase.firestore.FieldPath.documentId(), 'in', ids.slice(0, 50)).get();
        if (snap.empty) { listEl.innerHTML = '<div class="profile-empty">Nenhum evento encontrado.</div>'; return; }

        snap.forEach((doc, idx) => {
            const ev = doc.data();
            const isOwner = ev.creatorId === currentUser.uid;
            const count = ev.attendeeCount || ev.attendees?.length || 1;
            const card = document.createElement('div');
            card.className = `my-event-card ${isOwner ? 'owner' : ''}`;
            card.style.animationDelay = `${idx * 0.08}s`;
            card.innerHTML = `
                <h3>${escapeHtml(ev.name)}</h3>
                <p class="event-desc">${escapeHtml(ev.desc)}</p>
                <div class="event-meta">
                    <span class="material-icons-round" style="font-size:16px;">location_on</span>
                    ${escapeHtml(ev.location)} &nbsp;·&nbsp;
                    <span class="material-icons-round" style="font-size:16px;">people</span> ${count}
                </div>
                <div style="margin-bottom:12px;">
                    <button class="btn-map-profile" data-action="map" data-id="${doc.id}">
                        <span class="material-icons-round">map</span> Ver no Mapa
                    </button>
                </div>
                <div class="my-event-actions">
                    <button class="btn-event chat" data-action="chat" data-id="${doc.id}" data-name="${escapeHtml(ev.name)}" data-count="${count}">
                        <span class="material-icons-round" style="font-size:16px;">chat</span> Chat
                    </button>
                    <button class="btn-event rate" data-action="rate" data-id="${doc.id}" data-name="${escapeHtml(ev.name)}">
                        <span class="material-icons-round" style="font-size:16px;">star</span> Avaliar
                    </button>
                    ${isOwner ? `<button class="btn-event edit" data-action="edit" data-id="${doc.id}">
                        <span class="material-icons-round" style="font-size:16px;">edit</span> Editar
                    </button>` : ''}
                    <button class="btn-event leave" data-action="leave" data-id="${doc.id}">
                        <span class="material-icons-round" style="font-size:16px;">logout</span> Sair do Evento
                    </button>
                </div>
            `;
            listEl.appendChild(card);
        });

        listEl.onclick = (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            if (action === 'map') {
                const ev = allEvents.find(x => x.id === id);
                if (ev) openMapModal(ev.name, ev.location, ev.mapsUrl, ev.url);
            } else if (action === 'chat') openChat(id, btn.dataset.name, parseInt(btn.dataset.count));
            else if (action === 'rate') openRatingModal(id, btn.dataset.name);
            else if (action === 'edit') editEvent(id);
            else if (action === 'leave') removeFromEvent(id);
        };
    } catch (e) { console.error(e); listEl.innerHTML = '<div class="profile-empty">Erro ao carregar eventos.</div>'; }
    finally { showLoading(false); }
}

// ==================== FECHAR MODAIS ====================
document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', () => $(btn.dataset.close).classList.remove('show'));
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });
});
 $('confirmYes').addEventListener('click', () => {
    $('confirmModal').classList.remove('show');
    if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});
 $('confirmNo').addEventListener('click', () => { $('confirmModal').classList.remove('show'); confirmCallback = null; });

// ==================== NAVEGAÇÃO ====================
 $('userInfoBtn').addEventListener('click', () => { showScreen('profileScreen'); loadMyEvents(); });
 $('userInfoBtn').addEventListener('keypress', e => { if (e.key === 'Enter') { showScreen('profileScreen'); loadMyEvents(); } });
 $('backToTinderBtn').addEventListener('click', () => showScreen('tinderScreen'));

// ==================== AUTH ====================
 $('googleLoginBtn').addEventListener('click', async () => {
    try { showLoading(true); await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    catch (e) { showToast('Erro no login', 'error'); }
    finally { showLoading(false); }
});
 $('logoutBtn').addEventListener('click', () => auth.signOut());

auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
        $('userPhoto').src = user.photoURL || 'https://picsum.photos/seed/avatar/100/100';
        $('userName').textContent = user.displayName?.split(' ')[0] || 'Usuário';
        showScreen('tinderScreen');

        db.collection('events').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
            allEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            db.collection('user_events').doc(currentUser.uid).get().then(userDoc => {
                const seen = userDoc.exists ? (userDoc.data().seenEvents || []) : [];
                filteredEvents = allEvents.filter(e => !seen.includes(e.id));
                currentCardIndex = 0;
                renderCards();
            }).catch(() => { filteredEvents = [...allEvents]; currentCardIndex = 0; renderCards(); });
        });
    } else {
        showScreen('loginScreen');
        if (unsubscribeChat) unsubscribeChat();
        unsubscribeChat = null;
    }
});
</script>
